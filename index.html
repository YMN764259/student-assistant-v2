<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الطالب التفاعلي</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .tool-card { border: 1px solid #ccc; padding: 15px; margin: 10px; border-radius: 8px; display: inline-block; width: 200px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>مرحباً بك في نظام الطالب التفاعلي</h1>
    
    <div id="tools">
        <div class="tool-card">
            <h3>التدريبات اللغوية</h3>
            <button onclick="alert('جارٍ تطوير هذه الأداة!')">ابدأ التدريب</button>
        </div>
        <div class="tool-card">
            <h3>الاختبارات التجريبية</h3>
            <button onclick="alert('قريباً ستتمكن من اختبار مهاراتك!')">ابدأ الاختبار</button>
        </div>
    </div>

    <footer>
        <p>تم إنشاء وتطوير هذا الذكاء الاصطناعي بواسطة يمني حميد</p>
    </footer>
</body>
</html>
