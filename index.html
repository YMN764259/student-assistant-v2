<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentAI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background: linear-gradient(-45deg, #0f172a, #1e293b, #111827, #0c4a6e);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
}
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}
.card:hover { transform: translateY(-5px); transition: .3s; }
.fade { animation: fade .8s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="text-white min-h-screen p-5">

<div id="setup" class="max-w-lg mx-auto glass rounded-3xl p-8 shadow-2xl mt-10 fade">
    <h1 class="text-4xl font-bold text-center text-cyan-400 mb-2">StudentAI Pro</h1>
    <p class="text-center text-gray-300 mb-6">منصة الطالب الذكية المتقدمة</p>
    <input id="name" type="text" placeholder="اسم الطالب" class="w-full p-3 rounded-xl bg-gray-800 mb-4 outline-none"/>
    <select id="grade" class="w-full p-3 rounded-xl bg-gray-800 mb-4">
        <option>اختر المرحلة</option>
        <option>الابتدائي</option>
        <option>المتوسط</option>
        <option>الثانوي</option>
    </select>
    <select id="subject" class="w-full p-3 rounded-xl bg-gray-800 mb-6">
        <option>المادة المفضلة</option>
        <option>اللغة الإنجليزية</option>
        <option>الرياضيات</option>
        <option>العلوم</option>
        <option>البرمجة</option>
    </select>
    <button onclick="startSystem()" class="w-full bg-cyan-600 hover:bg-cyan-500 p-4 rounded-xl font-bold">دخول النظام</button>
</div>

<div id="dashboard" class="hidden fade">
    <div class="glass rounded-3xl p-6 mb-6">
        <div class="flex flex-wrap justify-between items-center">
            <div>
                <h1 id="welcome" class="text-3xl font-bold text-cyan-400"></h1>
                <p class="text-gray-300">مرحباً بك في لوحة التحكم الذكية</p>
            </div>
            <div class="text-center">
                <div id="clock" class="text-2xl font-bold text-green-400"></div>
                <div id="date" class="text-gray-400"></div>
            </div>
        </div>
    </div>

    <div class="grid md:grid-cols-4 gap-4 mb-6">
        <div class="card bg-gradient-to-r from-blue-600 to-cyan-600 p-5 rounded-2xl">
            <h3>المستوى</h3>
            <h1 class="text-4xl font-bold">12</h1>
        </div>
        <div class="card bg-gradient-to-r from-green-600 to-emerald-600 p-5 rounded-2xl">
            <h3>XP</h3>
            <h1 id="xp-display" class="text-4xl font-bold">0</h1>
        </div>
        <div class="card bg-gradient-to-r from-purple-600 to-pink-600 p-5 rounded-2xl">
            <h3>الإنجازات</h3>
            <h1 class="text-4xl font-bold">24</h1>
        </div>
        <div class="card bg-gradient-to-r from-orange-600 to-red-600 p-5 rounded-2xl">
            <h3>ساعات الدراسة</h3>
            <h1 class="text-4xl font-bold">87</h1>
        </div>
    </div>
</div>

<footer class="text-center mt-10 text-gray-400">
    تم التطوير بواسطة يمني حميد © 2026
</footer>

<script>
    function startSystem() {
        let name = document.getElementById("name").value;
        if(name === "") { alert("أدخل اسمك"); return; }
        localStorage.setItem("studentName", name);
        document.getElementById("setup").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("welcome").innerHTML = "مرحباً " + name + " 👋";
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerHTML = now.toLocaleTimeString("ar-SA");
        document.getElementById("date").innerHTML = now.toLocaleDateString("ar-SA");
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
