<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Nova Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* خلفية الفضاء الفخمة */
        body { 
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); 
            min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* تأثير الزجاج */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="text-white p-6 flex flex-col items-center">

    <h1 class="text-xl font-bold text-cyan-400 mb-8">My Telegram Bot Updates webhook</h1>

    <div class="grid grid-cols-2 gap-4 w-full max-w-sm">
        <div class="glass p-6 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">
            <span class="text-3xl">🤖</span>
            <p class="text-sm mt-2">المساعد الذكي</p>
        </div>
        <div class="glass p-6 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">
            <span class="text-3xl">📚</span>
            <p class="text-sm mt-2">المكتبة</p>
        </div>
        <div class="glass p-6 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">
            <span class="text-3xl">🏆</span>
            <p class="text-sm mt-2">السجل</p>
        </div>
        <div class="glass p-6 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">
            <span class="text-3xl">⚡</span>
            <p class="text-sm mt-2">تحدي اليوم</p>
        </div>
    </div>

</body>
</html>
