<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentAI Pro | النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card:hover { transform: scale(1.02); transition: 0.3s; border-color: rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div id="setup" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold text-cyan-400 mb-6">أهلاً بك في StudentAI</h1>
        <input id="name" type="text" placeholder="اسم الطالب" class="w-full p-4 mb-4 bg-gray-900 rounded-xl outline-none border border-gray-700">
        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-4 mb-6 bg-gray-900 rounded-xl outline-none border border-gray-700">
        <button onclick="startSystem()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold">بدء الرحلة</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-lg">
        <div class="glass p-6 rounded-3xl mb-6 flex justify-between items-center">
            <h1 id="welcome" class="text-xl font-bold text-cyan-400"></h1>
            <button onclick="logout()" class="text-red-400 text-sm">خروج</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="openAI()" class="card glass p-8 rounded-3xl text-center cursor-pointer border border-transparent">
                <div class="text-3xl mb-2">🤖</div>
                <p class="text-sm">المساعد الذكي</p>
            </div>
            <div class="card glass p-8 rounded-3xl text-center cursor-pointer border border-transparent">
                <div class="text-3xl mb-2">📚</div>
                <p class="text-sm">المكتبة</p>
            </div>
            <div class="card glass p-8 rounded-3xl text-center cursor-pointer border border-transparent">
                <div class="text-3xl mb-2">⚡</div>
                <p class="text-sm">تحدي اليوم</p>
            </div>
            <div class="card glass p-8 rounded-3xl text-center cursor-pointer border border-transparent">
                <div class="text-3xl mb-2">🏆</div>
                <p class="text-sm">السجل</p>
            </div>
        </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-6 rounded-3xl border border-cyan-500/30 text-center">
            <h2 class="text-xl font-bold text-cyan-400 mb-4">SPEAK WITH TOOL NOVA</h2>
            <div class="w-full h-12 bg-gray-900 rounded-full mb-4 border border-gray-700 flex items-center px-4">
                <span class="text-cyan-500 font-bold mr-2">TN</span>
            </div>
            <button onclick="closeAI()" class="text-gray-400 text-sm">إغلاق</button>
        </div>
    </div>

    <script>
        function startSystem() {
            localStorage.setItem("user", document.getElementById("name").value);
            location.reload();
        }
        function openAI() { document.getElementById("ai-modal").classList.remove("hidden"); }
        function closeAI() { document.getElementById("ai-modal").classList.add("hidden"); }
        function logout() { localStorage.clear(); location.reload(); }
        
        window.onload = () => {
            if(localStorage.getItem("user")) {
                document.getElementById("setup").classList.add("hidden");
                document.getElementById("dashboard").classList.remove("hidden");
                document.getElementById("welcome").innerText = "أهلاً " + localStorage.getItem("user");
            }
        }
    </script>
</body>
</html>
