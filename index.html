<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentAI Pro | نظامك الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(-45deg, #0f172a, #1e293b, #111827, #0c4a6e); background-size: 400% 400%; animation: bgMove 15s ease infinite; }
        @keyframes bgMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card:hover { transform: translateY(-8px); transition: .4s; }
        .fade { animation: fade 0.8s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-white min-h-screen p-5 font-sans">

    <!-- شاشة تسجيل الدخول -->
    <div id="setup" class="max-w-md mx-auto glass rounded-3xl p-8 shadow-2xl mt-10 fade">
        <h1 class="text-4xl font-bold text-center text-cyan-400 mb-2">StudentAI Pro</h1>
        <p class="text-center text-gray-300 mb-8">منصة الطالب الذكية المتقدمة</p>
        <input id="name" type="text" placeholder="اسم الطالب" class="w-full p-4 rounded-xl bg-gray-800 mb-4 outline-none border border-gray-700">
        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-xl bg-gray-800 mb-6 outline-none border border-gray-700">
        <button onclick="startSystem()" class="w-full bg-cyan-600 hover:bg-cyan-500 p-4 rounded-xl font-bold text-lg shadow-lg">دخول النظام</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="hidden max-w-5xl mx-auto fade">
        <div class="glass rounded-3xl p-8 mb-6 flex flex-wrap justify-between items-center">
            <div>
                <h1 id="welcome" class="text-3xl font-bold text-cyan-400"></h1>
                <p class="text-gray-300">مرحباً بك في لوحة التحكم الذكية</p>
            </div>
            <div class="text-center">
                <div id="clock" class="text-3xl font-bold text-green-400"></div>
                <div id="date" class="text-gray-400"></div>
            </div>
        </div>

        <div class="grid md:grid-cols-4 gap-4 mb-8">
            <div class="card glass p-6 rounded-2xl border-l-4 border-blue-500">
                <h3 class="text-gray-400">المستوى</h3>
                <h1 class="text-4xl font-bold">12</h1>
            </div>
            <div class="card glass p-6 rounded-2xl border-l-4 border-green-500">
                <h3 class="text-gray-400">XP</h3>
                <h1 id="xp-display" class="text-4xl font-bold">0</h1>
            </div>
            <div class="card glass p-6 rounded-2xl border-l-4 border-purple-500">
                <h3 class="text-gray-400">الإنجازات</h3>
                <h1 class="text-4xl font-bold">24</h1>
            </div>
            <div class="card glass p-6 rounded-2xl border-l-4 border-orange-500">
                <h3 class="text-gray-400">ساعات الدراسة</h3>
                <h1 class="text-4xl font-bold">87</h1>
            </div>
        </div>

        <div class="glass rounded-2xl p-8">
            <h2 class="text-2xl font-bold text-cyan-400 mb-6">المهام اليومية</h2>
            <div class="grid md:grid-cols-3 gap-4">
                <button onclick="addXP(50)" class="bg-gray-800 p-5 rounded-xl hover:bg-gray-700 transition">✅ حفظ 20 كلمة (50 XP)</button>
                <button onclick="addXP(100)" class="bg-gray-800 p-5 rounded-xl hover:bg-gray-700 transition">🧮 حل 10 مسائل (100 XP)</button>
                <button onclick="addXP(30)" class="bg-gray-800 p-5 rounded-xl hover:bg-gray-700 transition">🔬 مراجعة العلوم (30 XP)</button>
            </div>
        </div>
    </div>

    <footer class="text-center mt-12 text-gray-500 text-sm">
        تم التطوير بواسطة يمني حميد © 2026
    </footer>

    <script>
        function startSystem() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            if(name === "" || email === "") { alert("يرجى إدخال البيانات كاملة"); return; }
            localStorage.setItem("studentName", name);
            document.getElementById("setup").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("welcome").innerHTML = "مرحباً " + name + " 👋";
        }

        function addXP(amount) {
            let currentXP = parseInt(localStorage.getItem("xp")) || 0;
            currentXP += amount;
            localStorage.setItem("xp", currentXP);
            document.getElementById("xp-display").innerText = currentXP;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById("clock").innerHTML = now.toLocaleTimeString("ar-SA");
            document.getElementById("date").innerHTML = now.toLocaleDateString("ar-SA");
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
