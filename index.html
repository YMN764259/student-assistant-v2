
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .glass-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; transition: 0.4s; }
        .glass-box:hover { transform: scale(1.05); border-color: #06b6d4; }
    </style>
</head>
<body>
    <div class="grid grid-cols-2 gap-6 p-6">
        <div class="glass-box p-8 flex flex-col items-center">
            <img src="https://i.imgur.com/8QzX9nN.png" class="w-20 h-20 mb-4">
            <h3 class="text-white font-bold">المساعد الذكي</h3>
        </div>
        <div class="glass-box p-8 flex flex-col items-center">
            <img src="https://i.imgur.com/wYx0Wv2.png" class="w-20 h-20 mb-4">
            <h3 class="text-white font-bold">المكتبة</h3>
        </div>
    </div>
</body>
</html>
