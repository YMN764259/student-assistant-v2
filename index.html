<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* خلفية الفضاء العميق */
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* كود تأثير الزجاج (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>
</head>
<body>

    <div class="glass-card p-8 w-64 text-center text-white">
        <div class="mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712038.png" alt="Robot" class="w-24 h-24 mx-auto">
        </div>
        <h3 class="font-bold text-lg mb-1">المساعد الذكي</h3>
        <p class="text-xs text-gray-300 mb-6">مدرسك الخاص 24/7</p>
        
        <button class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-bold text-sm shadow-lg">
            START CHAT
        </button>
    </div>

</body>
</html>
