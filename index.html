<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; min-height: 100vh; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div id="setup" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-sm p-8 rounded-3xl text-center">
            <h1 class="text-2xl font-bold text-cyan-400 mb-6">تسجيل الدخول</h1>
            <input id="name" type="text" placeholder="اسمك الكريم" class="w-full p-4 mb-4 bg-gray-800 rounded-xl border border-gray-700 outline-none">
            <button onclick="saveUser()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold">بدء الرحلة</button>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen p-6 flex flex-col items-center">
        <div class="w-full max-w-lg mb-8 text-right">
            <h1 id="welcome" class="text-2xl font-bold text-cyan-400"></h1>
        </div>

        <div class="w-full max-w-lg grid grid-cols-2 gap-4">
            <div onclick="openAI()" class="glass p-8 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">🤖<br>المساعد الذكي</div>
            <div class="glass p-8 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">📚<br>المكتبة</div>
            <div class="glass p-8 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">⚡<br>تحدي اليوم</div>
            <div class="glass p-8 rounded-3xl text-center cursor-pointer hover:bg-white/10 transition">🏆<br>السجل</div>
        </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-8 rounded-3xl text-center border border-cyan-500/30">
            <h2 class="text-xl font-bold text-cyan-400 mb-6">SPEAK WITH TOOL NOVA</h2>
            <div class="w-full bg-black p-4 rounded-full mb-6 border border-gray-700 text-left">TN | ...</div>
            <button onclick="closeAI()" class="text-gray-400">إغلاق</button>
        </div>
    </div>

    <script>
        function saveUser() {
            let name = document.getElementById("name").value;
            if(name) {
                localStorage.setItem("user", name);
                location.reload();
            }
        }
        function openAI() { document.getElementById("ai-modal").classList.remove("hidden"); }
        function closeAI() { document.getElementById("ai-modal").classList.add("hidden"); }
        
        window.onload = () => {
            let user = localStorage.getItem("user");
            if(user) {
                document.getElementById("setup").classList.add("hidden");
                document.getElementById("dashboard").classList.remove("hidden");
                document.getElementById("welcome").innerText = "أهلاً " + user;
            }
        }
    </script>
</body>
</html>
